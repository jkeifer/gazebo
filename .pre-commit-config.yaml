repos:
  - repo: local
    hooks:
      - id: ruff_check
        name: ruff check
        entry: ruff check --force-exclude
        language: python
        'types_or': [python, pyi]
        args: [--fix, --exit-non-zero-on-fix]
        require_serial: true
      - id: ruff_format
        name: ruff format
        entry: ruff format --force-exclude
        language: python
        'types_or': [python, pyi]
        args: []
        require_serial: true
      - id: check-added-large-files
        name: Check for added large files
        entry: check-added-large-files
        language: system
      - id: check-toml
        name: Check Toml
        entry: check-toml
        language: system
        types: [toml]
      - id: check-yaml
        name: Check Yaml
        entry: check-yaml
        language: system
        types: [yaml]
      - id: end-of-file-fixer
        name: Fix End of Files
        entry: end-of-file-fixer
        language: system
        types: [text]
        stages: [pre-commit, pre-push, manual]
      - id: trailing-whitespace
        name: Trim Trailing Whitespace
        entry: trailing-whitespace-fixer
        language: system
        types: [text]
        stages: [pre-commit, pre-push, manual]
      # Type-check the whole repo (so future top-level code is covered without
      # editing an allowlist) except the example. The example is a separate
      # workspace member with its own top-level ``conftest`` and package, so it is
      # excluded here (via tool config) and checked by its own hooks below, run from
      # inside its directory so the root exclude doesn't reach it.
      - id: mypy
        name: mypy
        entry: mypy
        language: python
        'types_or': [python, pyi]
        pass_filenames: false
        args: ['.']
        require_serial: true
      - id: pyright
        name: pyright
        entry: pyright
        language: system
        'types_or': [python, pyi]
        pass_filenames: false
        args: []
        require_serial: true
      - id: mypy-garden
        name: mypy (garden)
        entry: bash -c 'cd examples/garden && exec mypy garden tests'
        language: system
        'types_or': [python, pyi]
        pass_filenames: false
        require_serial: true
      - id: pyright-garden
        name: pyright (garden)
        entry: bash -c 'cd examples/garden && exec pyright garden tests'
        language: system
        'types_or': [python, pyi]
        pass_filenames: false
        require_serial: true
